<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Geral — Pref. Gov. Edison Lobão</title>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- SheetJS -->
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- Recharts -->
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <!-- jsPDF pré-carregado (evita falha de load dinâmico) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Brasão (imagem base64) -->
  <script src="./brasao.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    #splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #006000;
      color: #EFD103; font-family: sans-serif; gap: 14px; z-index: 9999;
      transition: opacity .4s;
    }
    #splash strong { font-size: 15px; letter-spacing: .05em; }
    #splash p      { font-size: 13px; color: rgba(255,255,255,.7); }
    #splash .err   { font-size: 13px; color: #fca5a5; padding: 0 24px;
                     text-align: center; line-height: 1.7; }
    .spin {
      width: 38px; height: 38px;
      border: 3px solid rgba(255,255,255,.2);
      border-top-color: #EFD103;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash">
    <div class="spin"></div>
    <strong>CONTROLADORIA GERAL</strong>
    <p>Pref. Gov. Edison Lobão — carregando…</p>
  </div>
  <div id="root"></div>

  <script>
    // Expor React hooks e componentes globalmente
    window.React       = React;
    window.useState    = React.useState;
    window.useEffect   = React.useEffect;
    window.useCallback = React.useCallback;
    window.useMemo     = React.useMemo;
    window.useRef      = React.useRef;

    // Recharts
    if (window.Recharts) {
      ['BarChart','Bar','XAxis','YAxis','CartesianGrid','Tooltip',
       'LineChart','Line','ResponsiveContainer','Legend',
       'PieChart','Pie','Cell'].forEach(function(k){
        if (window.Recharts[k]) window[k] = window.Recharts[k];
      });
    }

    // jsPDF já está disponível como window.jspdf (carregado acima)
    // Não precisa de carregamento dinâmico

    // Montar o app após app.js carregar
    function mountApp() {
      var splash = document.getElementById('splash');
      if (!window.App) {
        splash.innerHTML = '<p class="err">Erro: App não encontrado.<br>Verifique o repositório.</p>';
        return;
      }
      try {
        ReactDOM.createRoot(document.getElementById('root'))
                .render(React.createElement(window.App));
        splash.style.opacity = '0';
        setTimeout(function(){ splash.style.display = 'none'; }, 400);
      } catch(e) {
        splash.innerHTML = '<p class="err">Erro ao iniciar:<br>' + e.message + '</p>';
        console.error(e);
      }
    }
  </script>

  <!-- App pré-compilado (JS puro) -->
  <script src="./app.js" onload="mountApp()" onerror="document.getElementById('splash').innerHTML='<p class=err>Erro ao carregar app.js. Verifique o repositório.</p>'"></script>

</body>
</html>
